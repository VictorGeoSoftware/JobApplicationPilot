<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Recruiter Copilot</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <header class="panel-header">
        <h1>Elite Recruiter Copilot</h1>
      </header>

      <section class="social-links" aria-label="Social links">
        <button
          type="button"
          class="social-btn"
          data-name="LinkedIn"
          data-link="https://www.linkedin.com/in/victor-palma-carrasco-a884ba57/"
          aria-label="Copy LinkedIn profile link"
          title="Copy LinkedIn link"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M20.45 20.45h-3.56v-5.57c0-1.33-.03-3.03-1.85-3.03c-1.85 0-2.13 1.44-2.13 2.93v5.67H9.34V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85c3.6 0 4.27 2.37 4.27 5.46v6.28zM5.32 7.43a2.07 2.07 0 1 1 0-4.14a2.07 2.07 0 0 1 0 4.14zM7.1 20.45H3.54V9H7.1v11.45zM22.23 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.46c.98 0 1.77-.77 1.77-1.72V1.72C24 .77 23.21 0 22.23 0z"
            ></path>
          </svg>
        </button>
        <button
          type="button"
          class="social-btn"
          data-name="GitHub"
          data-link="https://github.com/VictorGeoSoftware"
          aria-label="Copy GitHub profile link"
          title="Copy GitHub link"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 .5a12 12 0 0 0-3.79 23.39c.6.11.82-.26.82-.58v-2.02c-3.34.73-4.04-1.61-4.04-1.61c-.55-1.38-1.33-1.75-1.33-1.75c-1.09-.75.08-.74.08-.74c1.2.08 1.83 1.22 1.83 1.22c1.08 1.83 2.82 1.3 3.51 1c.11-.77.42-1.3.76-1.6c-2.66-.3-5.47-1.32-5.47-5.88c0-1.3.47-2.36 1.23-3.2c-.13-.3-.53-1.52.12-3.17c0 0 1.01-.32 3.3 1.22a11.4 11.4 0 0 1 6 0c2.29-1.54 3.3-1.22 3.3-1.22c.65 1.65.25 2.87.12 3.17c.76.84 1.23 1.9 1.23 3.2c0 4.57-2.81 5.58-5.49 5.88c.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.82.58A12 12 0 0 0 12 .5z"
            ></path>
          </svg>
        </button>
        <button
          type="button"
          class="social-btn"
          data-name="Medium"
          data-link="https://medium.com/@vpalmacarrasco"
          aria-label="Copy Medium profile link"
          title="Copy Medium link"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M2 6.5l2.34 2.24v8.76L2 20v.5h6.17V20l-2.31-2.5V9.22L12.5 20.5h.77l5.73-13.08v9.85L16.74 20v.5H22V20l-2-2.73V8.73L22 6.5V6h-5.56l-3.96 9.05L9.1 6H2v.5z"
            ></path>
          </svg>
        </button>
      </section>

      <section id="chat" class="chat"></section>

      <section class="meta-grid">
        <input id="companyName" type="text" placeholder="Company name (optional)" />
        <input id="jobUrl" type="url" placeholder="Job URL (optional)" />
      </section>

      <section class="input-wrap">
        <textarea id="questionInput" rows="3" placeholder="Paste the application question here..."></textarea>
        <div class="actions">
          <label class="upload-btn" for="screenshotInput">Upload Screenshot</label>
          <input id="screenshotInput" type="file" accept="image/*" />
          <button id="clearBtn" type="button" class="secondary-btn">Clear</button>
          <button id="sendBtn">Get Answer</button>
        </div>
      </section>

      <p id="status" class="status"></p>
      <p id="llmLabel" class="llm-label">LLM: ...</p>
    </main>

    <script src="popup.js" type="module"></script>
  </body>
</html>
